<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback Wall</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5">
    <h1 class="h3">Feedback Wall</h1>
    <p class="text-danger">Vulnerable rendering: stored feedback is marked safe.</p>
    {% for item in items %}
      <article class="bg-white border rounded-2 p-3 mb-3">
        <div class="small text-muted">{{ item["username"] }} - {{ item["created_at"] }}</div>
        <div>{{ item["message"] | safe }}</div>
      </article>
    {% endfor %}
  </main>
</body>
</html>
